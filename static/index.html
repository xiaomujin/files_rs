<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>本地文件库</title>
    <script>
        (function () {
            const storageKey = 'files-theme';
            const root = document.documentElement;
            const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;

            try {
                const savedTheme = localStorage.getItem(storageKey);
                if (savedTheme === 'light' || savedTheme === 'dark') {
                    root.dataset.theme = savedTheme;
                    return;
                }
            } catch (_) {
                // ignore storage access errors
            }

            root.dataset.theme = prefersDark ? 'dark' : 'light';
        })();
    </script>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <div class="app-shell">
        <header class="app-header">
            <div>
                <p class="eyebrow">Local Files</p>
                <h1>本地文件库</h1>
                <p class="app-subtitle">在浏览器里整理、上传和取回常用文件，保持轻量、清晰的本地管理体验。</p>
            </div>
            <div class="header-status">
                <span class="status-pill" id="fileCount">共 0 个文件</span>
                <button class="btn btn-secondary theme-toggle" id="themeToggleButton" type="button" aria-label="切换主题" aria-pressed="false">主题切换</button>
            </div>
        </header>

        <main class="app-main">
            <section class="panel upload-panel">
                <div class="panel-head">
                    <div>
                        <h2>上传新文件</h2>
                        <p>支持点击选择或拖拽上传，系统会保留原始扩展名并自动处理重名。</p>
                    </div>
                    <button class="btn btn-primary" id="pickFileButton" type="button">选择文件</button>
                </div>

                <label class="upload-dropzone" id="uploadArea" for="fileInput">
                    <input type="file" class="file-input" id="fileInput" multiple>
                    <div class="upload-copy">
                        <div class="upload-title">把文件拖到这里，或点按按钮开始上传</div>
                        <div class="upload-hint">支持任意文件类型，上传完成后可继续下载、重命名或删除。</div>
                    </div>
                </label>

                <div class="upload-progress" id="progressBar" aria-hidden="true">
                    <div class="upload-progress-bar">
                        <div class="upload-progress-fill" id="progressFill"></div>
                    </div>
                    <div class="upload-progress-text" id="progressText">准备接收文件...</div>
                </div>
            </section>

            <section class="panel files-panel">
                <div class="panel-head panel-head-compact">
                    <div>
                        <h2>已上传文件</h2>
                        <p>按最新时间排序，支持下载、重命名和删除。</p>
                    </div>
                    <button class="btn btn-secondary" id="refreshButton" type="button">刷新列表</button>
                </div>

                <div class="state loading-state" id="loadingState" hidden>
                    <div class="spinner"></div>
                    <p>正在同步文件列表...</p>
                </div>

                <div class="state empty-state" id="emptyState" hidden>
                    <div class="empty-title">还没有文件</div>
                    <p>上传第一个文件后，这里会立即显示最新内容。</p>
                </div>

                <div class="file-list" id="fileList" aria-live="polite"></div>
            </section>
        </main>
    </div>

    <div class="toast-stack" id="toastStack" aria-live="polite" aria-atomic="true"></div>

    <div class="modal" id="renameModal" hidden>
        <div class="modal-backdrop" data-action="close-modal"></div>
        <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="renameModalTitle">
            <div class="modal-header">
                <h3 id="renameModalTitle">修改文件名</h3>
                <button class="icon-button" type="button" data-action="close-modal" aria-label="关闭">×</button>
            </div>
            <div class="modal-body">
                <label class="field-label" for="newFileName">新文件名</label>
                <input type="text" class="field-input" id="newFileName" placeholder="例如：项目资料.pdf">
                <p class="field-help">文件名不能包含 /、\ 或 ..</p>
                <p class="field-error" id="renameError" aria-live="polite" hidden></p>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" type="button" data-action="close-modal">取消</button>
                <button class="btn btn-primary" type="button" id="confirmRenameButton">保存名称</button>
            </div>
        </div>
    </div>

    <template id="fileCardTemplate">
        <article class="file-card">
            <div class="file-main">
                <div class="file-name-group">
                    <div class="file-name" data-role="file-name"></div>
                    <div class="file-meta">
                        <span data-role="file-size"></span>
                        <span class="meta-separator">·</span>
                        <span data-role="file-date"></span>
                    </div>
                </div>
                <div class="file-actions">
                    <button class="btn btn-secondary btn-sm" type="button" data-action="download">下载</button>
                    <button class="btn btn-secondary btn-sm" type="button" data-action="rename">重命名</button>
                    <button class="btn btn-danger btn-sm" type="button" data-action="delete">删除</button>
                </div>
            </div>
        </article>
    </template>

    <script src="/js/app.js" defer></script>
</body>
</html>
