<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地文件管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            padding: 30px;
            margin-bottom: 20px;
        }

        .upload-section {
            margin-bottom: 30px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .upload-area.drag-over {
            border-color: #764ba2;
            background: #e8ebff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .upload-text {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 10px;
        }

        .upload-hint {
            font-size: 0.9rem;
            color: #666;
        }

        .file-input {
            display: none;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-download {
            background: #28a745;
            color: white;
        }

        .btn-download:hover {
            background: #218838;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
        }

        .btn-delete:hover {
            background: #c82333;
        }

        .btn-rename {
            background: #17a2b8;
            color: white;
        }

        .btn-rename:hover {
            background: #138496;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        .files-section h2 {
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .file-count {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #f8f9ff;
            color: #333;
            font-weight: 600;
            white-space: nowrap;
        }

        tr:hover {
            background: #f8f9ff;
        }

        .file-name {
            font-weight: 500;
            color: #333;
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-size {
            color: #666;
            white-space: nowrap;
        }

        .file-date {
            color: #666;
            white-space: nowrap;
            font-size: 0.9rem;
        }

        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            max-width: 400px;
        }

        .toast-success {
            background: #28a745;
        }

        .toast-error {
            background: #dc3545;
        }

        .toast-info {
            background: #17a2b8;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            max-width: 400px;
            width: 90%;
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from {
                transform: scale(0.9);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-title {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #333;
        }

        .modal-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }

        .modal-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn-cancel {
            background: #6c757d;
            color: white;
        }

        .btn-cancel:hover {
            background: #5a6268;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 15px;
            display: none;
        }

        .progress-bar.active {
            display: block;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
            width: 0%;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .card {
                padding: 20px;
            }

            th, td {
                padding: 10px;
            }

            .actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📁 本地文件管理系统</h1>
            <p>简单、安全、高效的文件管理解决方案</p>
        </div>

        <div class="card upload-section">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📤</div>
                <div class="upload-text">点击或拖拽文件到此处上传</div>
                <div class="upload-hint">支持所有文件类型</div>
                <input type="file" class="file-input" id="fileInput" multiple>
            </div>
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="card files-section">
            <h2>
                📂 文件列表
                <span class="file-count" id="fileCount">0 个文件</span>
            </h2>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <div>加载中...</div>
            </div>

            <div class="table-container" id="tableContainer" style="display: none;">
                <table>
                    <thead>
                        <tr>
                            <th>文件名</th>
                            <th>大小</th>
                            <th>上传时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="fileList">
                    </tbody>
                </table>
            </div>

            <div class="empty-state" id="emptyState">
                <div class="empty-icon">📭</div>
                <div>暂无文件，请上传文件</div>
            </div>
        </div>
    </div>

    <div class="modal" id="renameModal">
        <div class="modal-content">
            <h3 class="modal-title">重命名文件</h3>
            <input type="text" class="modal-input" id="newFileName" placeholder="请输入新文件名">
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeRenameModal()">取消</button>
                <button class="btn btn-primary" onclick="confirmRename()">确认</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let currentRenameId = null;

        /**
         * 显示提示消息
         * @param {string} message - 消息内容
         * @param {string} type - 消息类型 (success/error/info)
         */
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'slideIn 0.3s ease reverse';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        /**
         * 格式化文件大小
         * @param {number} bytes - 字节数
         * @returns {string} 格式化后的文件大小
         */
        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        /**
         * 格式化日期时间
         * @param {string} dateStr - 日期字符串
         * @returns {string} 格式化后的日期时间
         */
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        /**
         * 加载文件列表
         */
        async function loadFiles() {
            const loading = document.getElementById('loading');
            const tableContainer = document.getElementById('tableContainer');
            const emptyState = document.getElementById('emptyState');
            const fileList = document.getElementById('fileList');
            const fileCount = document.getElementById('fileCount');

            loading.classList.add('active');
            tableContainer.style.display = 'none';
            emptyState.style.display = 'none';

            try {
                const response = await fetch(`${API_BASE}/files`);
                const data = await response.json();

                loading.classList.remove('active');

                if (data.files && data.files.length > 0) {
                    tableContainer.style.display = 'block';
                    fileCount.textContent = `${data.total} 个文件`;

                    fileList.innerHTML = data.files.map(file => `
                        <tr>
                            <td class="file-name" title="${file.original_name}">${file.original_name}</td>
                            <td class="file-size">${formatSize(file.size)}</td>
                            <td class="file-date">${formatDate(file.created_at)}</td>
                            <td>
                                <div class="actions">
                                    <button class="btn btn-download btn-sm" onclick="downloadFile('${file.id}', '${file.original_name}')">
                                        ⬇️ 下载
                                    </button>
                                    <button class="btn btn-rename btn-sm" onclick="openRenameModal('${file.id}', '${file.original_name}')">
                                        ✏️ 重命名
                                    </button>
                                    <button class="btn btn-delete btn-sm" onclick="deleteFile('${file.id}', '${file.original_name}')">
                                        🗑️ 删除
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `).join('');
                } else {
                    emptyState.style.display = 'block';
                    fileCount.textContent = '0 个文件';
                }
            } catch (error) {
                loading.classList.remove('active');
                showToast('加载文件列表失败: ' + error.message, 'error');
            }
        }

        /**
         * 上传文件
         * @param {File} file - 要上传的文件
         */
        async function uploadFile(file) {
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');

            progressBar.classList.add('active');
            progressFill.style.width = '0%';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const xhr = new XMLHttpRequest();

                xhr.upload.addEventListener('progress', (e) => {
                    if (e.lengthComputable) {
                        const percent = (e.loaded / e.total) * 100;
                        progressFill.style.width = percent + '%';
                    }
                });

                xhr.addEventListener('load', () => {
                    progressBar.classList.remove('active');

                    if (xhr.status === 200) {
                        const response = JSON.parse(xhr.responseText);
                        if (response.success) {
                            showToast(`文件 "${file.name}" 上传成功！`, 'success');
                            loadFiles();
                        } else {
                            showToast(response.message || '上传失败', 'error');
                        }
                    } else {
                        showToast('上传失败，请重试', 'error');
                    }
                });

                xhr.addEventListener('error', () => {
                    progressBar.classList.remove('active');
                    showToast('上传失败，网络错误', 'error');
                });

                xhr.open('POST', `${API_BASE}/upload`);
                xhr.send(formData);
            } catch (error) {
                progressBar.classList.remove('active');
                showToast('上传失败: ' + error.message, 'error');
            }
        }

        /**
         * 下载文件
         * @param {string} id - 文件ID
         * @param {string} fileName - 文件名
         */
        async function downloadFile(id, fileName) {
            try {
                const response = await fetch(`${API_BASE}/download/${id}`);

                if (!response.ok) {
                    const error = await response.json();
                    showToast(error.message || '下载失败', 'error');
                    return;
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);

                showToast(`文件 "${fileName}" 下载成功！`, 'success');
            } catch (error) {
                showToast('下载失败: ' + error.message, 'error');
            }
        }

        /**
         * 删除文件
         * @param {string} id - 文件ID
         * @param {string} fileName - 文件名
         */
        async function deleteFile(id, fileName) {
            if (!confirm(`确定要删除文件 "${fileName}" 吗？\n此操作不可恢复！`)) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/files/${id}`, {
                    method: 'DELETE'
                });

                const data = await response.json();

                if (data.success) {
                    showToast(`文件 "${fileName}" 删除成功！`, 'success');
                    loadFiles();
                } else {
                    showToast(data.message || '删除失败', 'error');
                }
            } catch (error) {
                showToast('删除失败: ' + error.message, 'error');
            }
        }

        /**
         * 打开重命名模态框
         * @param {string} id - 文件ID
         * @param {string} currentName - 当前文件名
         */
        function openRenameModal(id, currentName) {
            currentRenameId = id;
            const modal = document.getElementById('renameModal');
            const input = document.getElementById('newFileName');

            modal.classList.add('active');
            input.value = currentName;
            input.focus();
            input.select();
        }

        /**
         * 关闭重命名模态框
         */
        function closeRenameModal() {
            const modal = document.getElementById('renameModal');
            modal.classList.remove('active');
            currentRenameId = null;
        }

        /**
         * 确认重命名
         */
        async function confirmRename() {
            const input = document.getElementById('newFileName');
            const newName = input.value.trim();

            if (!newName) {
                showToast('请输入文件名', 'error');
                return;
            }

            if (!currentRenameId) {
                showToast('文件ID无效', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/files/${currentRenameId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ new_name: newName })
                });

                const data = await response.json();

                if (data.success) {
                    showToast('文件重命名成功！', 'success');
                    closeRenameModal();
                    loadFiles();
                } else {
                    showToast(data.message || '重命名失败', 'error');
                }
            } catch (error) {
                showToast('重命名失败: ' + error.message, 'error');
            }
        }

        // 初始化上传区域事件
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('drag-over');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('drag-over');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('drag-over');

            const files = e.dataTransfer.files;
            for (const file of files) {
                uploadFile(file);
            }
        });

        fileInput.addEventListener('change', (e) => {
            const files = e.target.files;
            for (const file of files) {
                uploadFile(file);
            }
            fileInput.value = '';
        });

        // 模态框键盘事件
        document.getElementById('newFileName').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                confirmRename();
            }
        });

        document.getElementById('renameModal').addEventListener('click', (e) => {
            if (e.target.id === 'renameModal') {
                closeRenameModal();
            }
        });

        // 页面加载时获取文件列表
        document.addEventListener('DOMContentLoaded', loadFiles);
    </script>
</body>
</html>
